<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1a0000,#3b0000,#5e0000,#8b0000);
background-size:400% 400%;
animation:gradientMove 12s infinite alternate;
overflow:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* floating glow circles */

.circle{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:0.6;
animation:float 10s infinite alternate;
}

.circle1{
width:300px;
height:300px;
background:#ff0000;
top:10%;
left:10%;
}

.circle2{
width:250px;
height:250px;
background:#ff4d4d;
bottom:10%;
right:10%;
}

@keyframes float{
0%{transform:translateY(0px);}
100%{transform:translateY(-60px);}
}

/* glass card */

.card{
position:relative;
width:340px;
padding:40px 30px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
color:white;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
animation:cardFloat 4s ease-in-out infinite;
}

@keyframes cardFloat{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.profile{
width:110px;
height:110px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
margin-bottom:15px;
}

h2{
margin-bottom:10px;
font-size:22px;
}

.text{
font-size:14px;

.btn{

padding:14px 28px;
border-radius:50px;
font-weight:bold;
color:white;
text-decoration:none;
font-size:16px;
transition:0.4s;
position:relative;
overflow:hidden;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 25px #00c6ff;
}

.btn i{
font-size:18px;
}

/* disclaimer */

}
